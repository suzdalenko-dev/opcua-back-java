spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/opcua_prod}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      validation-timeout: 5000

logging:
  level:
    root: INFO
    suzdal.opcua: DEBUG